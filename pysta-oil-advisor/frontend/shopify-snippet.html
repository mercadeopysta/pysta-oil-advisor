<div id="pysta-oil-advisor" style="max-width:700px;margin:30px auto;padding:24px;border:1px solid #e5e5e5;border-radius:16px;background:#ffffff;font-family:Arial,sans-serif;">
  <h2 style="margin-top:0;font-size:28px;">Consulta la especificación de aceite para tu moto</h2>
  <p style="color:#555;line-height:1.5;">
    Selecciona la marca, referencia y año de tu moto para obtener una recomendación técnica referencial.
  </p>

  <div style="display:grid;gap:12px;">
    <select id="poa-brand" style="padding:12px;border:1px solid #ccc;border-radius:10px;font-size:16px;">
      <option value="">Selecciona una marca</option>
    </select>

    <select id="poa-model" style="padding:12px;border:1px solid #ccc;border-radius:10px;font-size:16px;" disabled>
      <option value="">Selecciona una referencia</option>
    </select>

    <select id="poa-year" style="padding:12px;border:1px solid #ccc;border-radius:10px;font-size:16px;" disabled>
      <option value="">Selecciona un año</option>
    </select>

    <button id="poa-submit" style="padding:14px 18px;border:none;border-radius:10px;background:#111;color:#fff;font-size:16px;cursor:pointer;">
      Consultar
    </button>
  </div>

  <div id="poa-status" style="margin-top:14px;color:#555;"></div>

  <div id="poa-result" style="display:none;margin-top:20px;padding:18px;border-radius:12px;background:#f7f7f7;">
    <h3 style="margin-top:0;">Resultado</h3>
    <p><strong>Moto encontrada:</strong> <span id="poa-vehicle"></span></p>
    <p><strong>Tipo de motor:</strong> <span id="poa-engine"></span></p>
    <p><strong>Viscosidad:</strong> <span id="poa-viscosity"></span></p>
    <p><strong>API:</strong> <span id="poa-api"></span></p>
    <p><strong>JASO:</strong> <span id="poa-jaso"></span></p>
    <p><strong>Capacidad aproximada:</strong> <span id="poa-capacity"></span> L</p>
    <p><strong>Nota:</strong> <span id="poa-notes"></span></p>
  </div>
</div>

<script>
(() => {
  const BASE_URL = "https://pysta-oil-advisor.onrender.com";
  const OPTIONS_URL = `${BASE_URL}/options`;
  const API_URL = `${BASE_URL}/recommend`;

  const brandSelect = document.getElementById("poa-brand");
  const modelSelect = document.getElementById("poa-model");
  const yearSelect = document.getElementById("poa-year");
  const submitBtn = document.getElementById("poa-submit");
  const statusBox = document.getElementById("poa-status");
  const resultBox = document.getElementById("poa-result");

  const vehicle = document.getElementById("poa-vehicle");
  const engine = document.getElementById("poa-engine");
  const viscosity = document.getElementById("poa-viscosity");
  const api = document.getElementById("poa-api");
  const jaso = document.getElementById("poa-jaso");
  const capacity = document.getElementById("poa-capacity");
  const notes = document.getElementById("poa-notes");

  let optionsData = {};

  function fillSelect(select, items, placeholder) {
    select.innerHTML = `<option value="">${placeholder}</option>`;
    items.forEach((item) => {
      const option = document.createElement("option");
      option.value = item;
      option.textContent = item;
      select.appendChild(option);
    });
  }

  async function loadOptions() {
    statusBox.textContent = "Cargando opciones...";
    try {
      const response = await fetch(OPTIONS_URL);
      const data = await response.json();

      if (!response.ok || !data.ok) {
        statusBox.textContent = "No se pudieron cargar las marcas.";
        return;
      }

      optionsData = data.options || {};
      const brands = Object.keys(optionsData).sort();
      fillSelect(brandSelect, brands, "Selecciona una marca");
      statusBox.textContent = "";
    } catch (error) {
      statusBox.textContent = "Error cargando las opciones.";
    }
  }

  brandSelect.addEventListener("change", () => {
    resultBox.style.display = "none";
    const brand = brandSelect.value;

    modelSelect.disabled = true;
    yearSelect.disabled = true;
    fillSelect(modelSelect, [], "Selecciona una referencia");
    fillSelect(yearSelect, [], "Selecciona un año");

    if (!brand || !optionsData[brand]) return;

    const models = Object.keys(optionsData[brand]).sort();
    fillSelect(modelSelect, models, "Selecciona una referencia");
    modelSelect.disabled = false;
  });

  modelSelect.addEventListener("change", () => {
    resultBox.style.display = "none";
    const brand = brandSelect.value;
    const model = modelSelect.value;

    yearSelect.disabled = true;
    fillSelect(yearSelect, [], "Selecciona un año");

    if (!brand || !model || !optionsData[brand] || !optionsData[brand][model]) return;

    const years = optionsData[brand][model].map(String).sort();
    fillSelect(yearSelect, years, "Selecciona un año");
    yearSelect.disabled = false;
  });

  submitBtn.addEventListener("click", async () => {
    const brand = brandSelect.value;
    const model = modelSelect.value;
    const year = yearSelect.value;

    resultBox.style.display = "none";
    statusBox.textContent = "";

    if (!brand || !model || !year) {
      statusBox.textContent = "Debes seleccionar marca, referencia y año.";
      return;
    }

    statusBox.textContent = "Consultando...";

    try {
      const response = await fetch(API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ brand, model, year })
      });

      const data = await response.json();

      if (!response.ok || !data.ok) {
        statusBox.textContent = data.error || "No fue posible consultar.";
        return;
      }

      vehicle.textContent = `${data.matched_vehicle.brand} ${data.matched_vehicle.model} ${data.matched_vehicle.year}`;
      engine.textContent = data.recommendation.engine_type;
      viscosity.textContent = data.recommendation.viscosity;
      api.textContent = data.recommendation.api;
      jaso.textContent = data.recommendation.jaso;
      capacity.textContent = data.recommendation.capacity_liters;
      notes.textContent = data.recommendation.notes;

      resultBox.style.display = "block";
      statusBox.textContent = "Consulta realizada correctamente.";
    } catch (error) {
      statusBox.textContent = "Error de conexión con la herramienta.";
    }
  });

  loadOptions();
})();
</script>
