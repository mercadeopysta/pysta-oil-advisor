<div id="pysta-oil-advisor" style="max-width:700px;margin:30px auto;padding:24px;border:1px solid #e5e5e5;border-radius:16px;background:#ffffff;font-family:Arial,sans-serif;">
  <h2 style="margin-top:0;font-size:28px;">Consulta la especificación de aceite para tu moto</h2>
  <p style="color:#555;line-height:1.5;">
    Ingresa los datos de tu moto y obtén una recomendación técnica del aceita a usar.
  </p>

  <div style="display:grid;gap:12px;">
    <input id="poa-brand" type="text" placeholder="Marca. Ej: AKT" style="padding:12px;border:1px solid #ccc;border-radius:10px;font-size:16px;">
    <input id="poa-model" type="text" placeholder="Modelo. Ej: NKD 125" style="padding:12px;border:1px solid #ccc;border-radius:10px;font-size:16px;">
    <input id="poa-year" type="number" placeholder="Año. Ej: 2022" style="padding:12px;border:1px solid #ccc;border-radius:10px;font-size:16px;">
    <button id="poa-submit" style="padding:14px 18px;border:none;border-radius:10px;background:#111;color:#fff;font-size:16px;cursor:pointer;">
      Consultar
    </button>
  </div>

  <div id="poa-status" style="margin-top:14px;color:#555;"></div>

  <div id="poa-result" style="display:none;margin-top:20px;padding:18px;border-radius:12px;background:#f7f7f7;">
    <h3 style="margin-top:0;">Resultado</h3>
    <p><strong>Moto encontrada:</strong> <span id="poa-vehicle"></span></p>
    <p><strong>Tipo de motor:</strong> <span id="poa-engine"></span></p>
    <p><strong>Viscosidad:</strong> <span id="poa-viscosity"></span></p>
    <p><strong>API:</strong> <span id="poa-api"></span></p>
    <p><strong>JASO:</strong> <span id="poa-jaso"></span></p>
    <p><strong>Capacidad aproximada:</strong> <span id="poa-capacity"></span> L</p>
    <p><strong>Nota:</strong> <span id="poa-notes"></span></p>
  </div>
</div>

<script>
  (() => {
    const API_URL = "https://pysta-oil-advisor.onrender.com/recommend";

    const brandInput = document.getElementById("poa-brand");
    const modelInput = document.getElementById("poa-model");
    const yearInput = document.getElementById("poa-year");
    const submitBtn = document.getElementById("poa-submit");
    const statusBox = document.getElementById("poa-status");
    const resultBox = document.getElementById("poa-result");

    const vehicle = document.getElementById("poa-vehicle");
    const engine = document.getElementById("poa-engine");
    const viscosity = document.getElementById("poa-viscosity");
    const api = document.getElementById("poa-api");
    const jaso = document.getElementById("poa-jaso");
    const capacity = document.getElementById("poa-capacity");
    const notes = document.getElementById("poa-notes");

    submitBtn.addEventListener("click", async () => {
      const brand = brandInput.value.trim();
      const model = modelInput.value.trim();
      const year = yearInput.value.trim();

      resultBox.style.display = "none";
      statusBox.textContent = "";

      if (!brand || !model || !year) {
        statusBox.textContent = "Debes completar marca, modelo y año.";
        return;
      }

      statusBox.textContent = "Consultando...";

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ brand, model, year })
        });

        const data = await response.json();

        if (!response.ok || !data.ok) {
          statusBox.textContent = data.error || "No fue posible consultar.";
          return;
        }

        vehicle.textContent = `${data.matched_vehicle.brand} ${data.matched_vehicle.model} ${data.matched_vehicle.year}`;
        engine.textContent = data.recommendation.engine_type;
        viscosity.textContent = data.recommendation.viscosity;
        api.textContent = data.recommendation.api;
        jaso.textContent = data.recommendation.jaso;
        capacity.textContent = data.recommendation.capacity_liters;
        notes.textContent = data.recommendation.notes;

        resultBox.style.display = "block";
        statusBox.textContent = `Coincidencia encontrada con confianza ${Math.round(data.confidence * 100)}%.`;
      } catch (error) {
        statusBox.textContent = "Error de conexión con la herramienta.";
      }
    });
  })();

</script>
